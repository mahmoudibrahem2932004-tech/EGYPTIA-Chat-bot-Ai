    influence_conversation: true
  
  location:
    type: text
    mappings:
      - type: from_entity
        entity: location
    influence_conversation: true

responses:
  utter_greet:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "👋 مرحباً بك في EGYPTIA Ai! أنا مساعدك السياحي الذكي. كيف أقدر أساعدك؟"
    - text: "👋 Welcome to EGYPTIA Ai! I'm your smart tourism assistant. How can I help?"

  utter_goodbye:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "مع السلامة! 👋 نتمنى لك رحلة سعيدة."
    - text: "Goodbye! 👋 Have a great trip."

  utter_thank:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "العفو! 😊 في خدمتك دائماً."
    - text: "You're welcome! 😊 Always here."

  utter_ask_name:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "اسمي EGYPTIA Ai 🏛️، مساعدك السياحي الذكي."
    - text: "My name is EGYPTIA Ai 🏛️, your smart tourism assistant."

  utter_ask_capabilities:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "أقدر أساعدك في: الآثار، الأماكن الدينية، الشواطئ، رحلات السفاري، رحلات النيل، الغوص، الطقس، الفنادق، المطاعم، معلومات عملية عن مصر."
    - text: "I can help with: monuments, religious sites, beaches, safaris, Nile cruises, diving, weather, hotels, restaurants, practical info about Egypt."

  utter_ask_help:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "أكيد! اسألني عن أي حاجة."
    - text: "Sure! Ask me anything."

  utter_mood_great:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "دايماً تبسط! 😊 كيف أساعدك؟"
    - text: "Great! 😊 How can I help?"

  utter_mood_unhappy:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "آسف تسمع كده 😔 ممكن أساعدك في حاجة؟"
    - text: "Sorry to hear that 😔 Can I help?"

  utter_affirm:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "تم ✓"
    - text: "Done ✓"

  utter_deny:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "تم الإلغاء"
    - text: "Cancelled"

  utter_ask_pyramids:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏛️ أهرامات الجيزة هي العجيبة الوحيدة الباقية من عجائب الدنيا السبع! بنيت كمقابر لملوك الأسرة الرابعة. تقدر تركب جمال وتشوف عروض الصوت والضوء. الأهرامات هي: هرم خوفو (الأكبر)، هرم خفرع، وهرم منقرع."
    - text: "🏛️ The Giza Pyramids are the only remaining wonder of the ancient Seven Wonders! Built as tombs for 4th dynasty kings. You can ride camels and see sound and light shows. The pyramids are: Khufu (largest), Khafre, and Menkaure."

  utter_ask_sphinx:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🦁 تمثال أبو الهول منحوت من صخرة واحدة، جسم أسد ورأس إنسان، ويقع بجوار الأهرامات. طوله 73 متر وارتفاعه 20 متر. بيعتقد أنه تم بناؤه في عهد الملك خفرع."
    - text: "🦁 The Sphinx is carved from one rock, lion body with human head, next to the pyramids. It's 73 meters long and 20 meters high. Believed to be built during Pharaoh Khafre's reign."

  utter_ask_karnak:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏛️ معبد الكرنك أكبر مجمع ديني قديم في العالم، مساحته 100 فدان! فيه 134 عمود ضخم في قاعة الأعمدة، ارتفاع العمود 23 متر. استغرق بناؤه أكثر من 1500 سنة."
    - text: "🏛️ Karnak Temple is the largest ancient religious complex, covering 100 acres! It has 134 massive columns in the Hypostyle Hall, each 23 meters high. Construction took over 1500 years."

  utter_ask_luxor_temple:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🌙 معبد الأقصر أجمل معبد في الليل، بناه رمسيس الثاني وأمنحتب الثالث. بيضي بالليل ويبقى منظر خرافي. بتربطه بمعبد الكرنك طريق الكباش."
    - text: "🌙 Luxor Temple is most beautiful at night, built by Ramses II and Amenhotep III. It's illuminated at night and connected to Karnak Temple by the Avenue of Sphinxes."

  utter_ask_abu_simbel:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏔️ معبد أبو سمبل نحته رمسيس الثاني في الجبل، وبيحصل فيه تعامد الشمس مرتين في السنة (22 فبراير و22 أكتوبر) عيد ميلاده ويوم تتويجه. تم نقل المعبد بالكامل في الستينات لإنقاذه من الغرق!"
    - text: "🏔️ Abu Simbel temple carved by Ramses II in the mountain, sun aligns twice yearly (Feb 22 & Oct 22) on his birthday and coronation. The entire temple was moved in the 1960s to save it from flooding!"

  utter_ask_hatshepsut:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "👑 معبد حتشبسوت تصميمه فريد على 3 مدرجات في جبل الدير البحري، للملكة حتشبسوت أشهر ملكة فرعونية. كانت بتلبس اللحية الفرعونية عشان تثبت شرعيتها كفرعون!"
    - text: "👑 Hatshepsut Temple has unique 3-terrace design at Deir el-Bahari, for Egypt's most famous female pharaoh. She wore the false royal beard to legitimize her rule!"

  utter_ask_valley_of_kings:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "⚰️ وادي الملوك فيه 65 مقبرة لملوك مصر القديمة، أشهرها مقبرة توت عنخ آمون اللي اكتشفها هوارد كارتر سنة 1922. المقابر كانت بتتزين بمناظر من كتاب الموتى."
    - text: "⚰️ Valley of Kings has 65 tombs of ancient Egyptian kings, most famous is Tutankhamun's discovered by Howard Carter in 1922. Tombs decorated with scenes from the Book of the Dead."

  utter_ask_egyptian_museum:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏺 المتحف المصري في التحرير فيه 120 ألف قطعة أثرية، أهمها كنوز توت عنخ آمون (أكثر من 5000 قطعة) والمومياوات الملكية. اتفتح سنة 1902."
    - text: "🏺 Egyptian Museum in Tahrir has 120,000 artifacts, most importantly Tutankhamun's treasures (over 5000 pieces) and royal mummies. Opened in 1902."

  utter_ask_grand_museum:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏛️ المتحف المصري الكبير أكبر متحف للآثار بالعالم، جنب الأهرامات، فيه كنوز توت عنخ آمون كاملة لأول مرة. مساحته 500 ألف متر مربع وتكلفته مليار دولار!"
    - text: "🏛️ Grand Egyptian Museum is world's largest archaeological museum, near pyramids, with complete Tutankhamun collection for first time. Area 500,000 sq meters, cost $1 billion!"

  utter_ask_saqqara:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🔺 سقارة فيها هرم زوسر المدرج، أقدم هرم حجري في التاريخ (عام 2700 ق.م). صممه المهندس إيمحتب، وكان في الأصل 6 مدرجات ارتفاعها 62 متر."
    - text: "🔺 Saqqara has Step Pyramid of Djoser, oldest stone pyramid in history (2700 BC). Designed by architect Imhotep, originally 6 steps, 62 meters high."

  utter_ask_dahshur:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🔻 دهشور فيها الهرم المنحني والهرم الأحمر لبني سنفرو. الهرم المنحني هو الوحيد اللي بيحتفظ بكسوته الأصلية، والهرم الأحمر أول هرم حقيقي كامل."
    - text: "🔻 Dahshur has Bent Pyramid and Red Pyramid built by Sneferu. Bent Pyramid is the only one retaining original casing, Red Pyramid is first true smooth-sided pyramid."

  utter_ask_al_azhar:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🕌 الجامع الأزهر منارة الإسلام، اتأسس سنة 970 م في العصر الفاطمي، وأقدم جامعة في العالم. بيعتبر أهم مركز للدراسات الإسلامية."
    - text: "🕌 Al-Azhar Mosque is lighthouse of Islam, founded in 970 AD during Fatimid era, oldest university in the world. It's the most important center for Islamic studies."

  utter_ask_amr_ibn_alaas:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🕌 جامع عمرو بن العاص أول مسجد في مصر وإفريقيا، اتبنى سنة 642 م بعد فتح مصر. كان بسيط جداً، مساحته 30×30 متر، اتعمل من جريد النخيل والطين."
    - text: "🕌 Amr Ibn Al-Aas Mosque is first mosque in Egypt and Africa, built in 642 AD after the conquest. It was very simple, 30×30 meters, made of palm trunks and mud."

  utter_ask_mohamed_ali_mosque:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🕌 مسجد محمد علي (جامع المرمر) في قلعة صلاح الدين، بناه محمد علي باشا على الطراز العثماني (1830-1848). شكله يشبه جامع السلطان أحمد في اسطنبول، وبيعتبر أشهر معالم القاهرة."
    - text: "🕌 Muhammad Ali Mosque (Alabaster Mosque) in Saladin Citadel, built by Muhammad Ali Pasha in Ottoman style (1830-1848). Looks like Sultan Ahmed Mosque in Istanbul, most famous Cairo landmark."

  utter_ask_saint_catherine:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "⛪ دير سانت كاترين أقدم دير مسيحي عامل في العالم (من القرن السادس)، في سيناء عند جبل موسى. فيه مكتبة المخطوطات التانية في العالم بعد الفاتيكان، وفيه البئر اللي شربت منه موسى."
    - text: "⛪ St. Catherine's Monastery is oldest working Christian monastery (6th century), in Sinai at Mount Moses. Has world's second largest manuscript library after Vatican, and the well where Moses drank."

  utter_ask_hanging_church:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "⛪ الكنيسة المعلقة في مصر القديمة، مبنية فوق بوابة حصن بابليون (القرن الثالث). اسمها كده لأنها معلقة فوق البرجين. أقدم كنيسة في مصر واتبنيت على شكل سفينة نوح."
    - text: "⛪ Hanging Church in Old Cairo, built above Babylon Fortress gate (3rd century). Called hanging because suspended above two towers. Oldest church in Egypt, built in Noah's Ark shape."

  utter_ask_sultan_hassan_mosque:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🕌 مسجد السلطان حسن تحفة معمارية مملوكية في القاهرة (1363). بيعتبر من أروع المساجد في العالم الإسلامي، ضخم جداً وبوابته ارتفاعها 26 متر!"
    - text: "🕌 Sultan Hassan Mosque is a Mamluk architectural masterpiece in Cairo (1363). Considered one of the most magnificent mosques in the Islamic world, massive with 26-meter high entrance!"

  utter_ask_ibn_tulun_mosque:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🕌 مسجد ابن طولون أقدم مساجد مصر المحفوظة بحالته الأصلية (879 م). بناه أحمد بن طولون، وبتتميز مئذنته بدرج حلزوني من بره زي مئذنة سامراء في العراق."
    - text: "🕌 Ibn Tulun Mosque is the oldest mosque in Egypt preserved in its original state (879 AD). Built by Ahmad Ibn Tulun, its minaret has an external spiral staircase like Samarra minaret in Iraq."

  utter_ask_abu_serga_church:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "⛪ كنيسة أبو سرجة في مصر القديمة (القرن الخامس)، بُنيت فوق مغارة العائلة المقدسة اللي استخبت فيها العيلة المقدسة وقت رحلتهم لمصر. من أقدس الأماكن المسيحية."
    - text: "⛪ Abu Serga Church in Old Cairo (5th century), built above the Holy Family cave where they took shelter during their flight to Egypt. One of the holiest Christian sites."

  utter_ask_ben_ezra_synagogue:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🕍 معبد بن عزرا في مصر القديمة (القرن التاسع)، من أقدم المعابد اليهودية. مكانه كان كنيسة قبل كده، اتحول لمعبد بعدين. اكتشفوا فيه وثائق جنيزة القاهرة الشهيرة."
    - text: "🕍 Ben Ezra Synagogue in Old Cairo (9th century), one of the oldest Jewish temples. It was previously a church, later converted to synagogue. Famous Cairo Geniza documents were found here."

  utter_ask_monastery_of_antonios:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "⛪ دير الأنبا أنطونيوس أقدم دير في العالم (القرن الرابع)، في البحر الأحمر. أسسه القديس أنطونيوس أبو الرهبان. لسه فيه رهبان عايشين فيه لغاية دلوقتي."
    - text: "⛪ Monastery of Saint Anthony is the oldest monastery in the world (4th century), in Red Sea. Founded by St. Anthony the Great, father of monasticism. Still inhabited by monks today."

  utter_ask_monastery_of_paula:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "⛪ دير الأنبا بولا أول متوحد مسيحي، قريب من دير الأنبا أنطونيوس (القرن الرابع). أسسه القديس بولا أول الناسك، ويعتبر تاني أقدم دير في العالم."
    - text: "⛪ Monastery of Saint Paul, near St. Anthony's monastery (4th century). Founded by St. Paul the Hermit, first Christian hermit. Second oldest monastery in the world."

  utter_ask_el_moiz_street:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏛️ شارع المعز لدين الله متحف مفتوح للعمارة الإسلامية (القرن العاشر). فيه آثار من العصور الفاطمية، الأيوبية، المملوكية والعثمانية. بطوله 1 كيلو متر."
    - text: "🏛️ Al-Muizz Street is an open museum of Islamic architecture (10th century). Has monuments from Fatimid, Ayyubid, Mamluk, and Ottoman eras. Length 1 kilometer."

  utter_ask_sharm_el_sheikh:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏖️ شرم الشيخ مدينة سياحية عالمية على البحر الأحمر، مشهورة بالغوص والشعاب المرجانية. فيها محمية رأس محمد (من أفضل مواقع الغوص)، وخليج نعمة، جزيرة تيران وصنافير."
    - text: "🏖️ Sharm El Sheikh is world-class Red Sea resort, famous for diving and coral reefs. Has Ras Mohamed reserve (top diving site), Naama Bay, Tiran and Sanafir islands."

  utter_ask_hurghada:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏖️ الغردقة أهم مدن السياحة الشاطئية، فيها منتجعات فاخرة وأنشطة مائية. أشهر مناطقها: السقالة، الجونة، سهل حشيش، مكادي باي. فيها جزر الجفتون والأرصفة."
    - text: "🏖️ Hurghada is major beach resort, with luxury hotels and water activities. Famous areas: Sakkala, El Gouna, Sahl Hasheesh, Makadi Bay. Has Giftun islands and aquarium."

  utter_ask_marsa_alam:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏖️ مرسى علم مشهورة بالشعاب المرجانية البكر، وتقدر تشوف السلاحف والدلافين. فيها دولفين هاوس (بيت الدلافين)، وادي الجمال، أبو دباب. من أجمل مواقع الغوص."
    - text: "🏖️ Marsa Alam is famous for pristine reefs, you can see turtles and dolphins. Has Dolphin House, Wadi El Gemal, Abu Dabbab. One of the most beautiful diving spots."

  utter_ask_dahab:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏖️ دهب مدينة شبابية في سيناء، مشهورة بالغوص الرخيص والركش. فيها بلو هول (أخطر موقع غوص بالعالم)، الوادي الملون، المشاية (مكان التنزه). بتتميز بالكمبينات والبدو."
    - text: "🏖️ Dahab is youthful Sinai town, famous for cheap diving and kite surfing. Has Blue Hole (world's most dangerous dive site), Colored Canyon, Masbat promenade. Known for camps and Bedouin culture."

  utter_ask_north_coast:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏖️ الساحل الشمالي على البحر المتوسط، مصيف المصريين الأول. أشهر منتجعاته: مارينا، العلمين، سيدي عبد الرحمن، مراسي، حاجز. بتتميز بالرمال البيضا والمية الفيروزية."
    - text: "🏖️ North Coast on Mediterranean, Egyptians' top summer destination. Famous resorts: Marina, Alamein, Sidi Abdel Rahman, Marassi, Hacienca. Known for white sand and turquoise water."

  utter_ask_el_gouna:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏖️ الجونة مدينة متكاملة على البحر الأحمر (على بعد 20 كم من الغردقة)، مشهورة بجزرها وقنواتها المائية. فيها 24 جزيرة، مطار خاص، ملاعب جولف، ومهرجان الجونة السينمائي."
    - text: "🏖️ El Gouna is an integrated town on the Red Sea (20 km from Hurghada), famous for its islands and lagoons. Has 24 islands, private airport, golf courses, and El Gouna Film Festival."

  utter_ask_taba:
    - condition:
        - type: slot
          name: language
          value: "ar"
      text: "🏖️ طابا في سيناء، على حدود إسرائيل والأردن، فيها منتجعات فخمة ومناظر طبيعية خلابة. أشهر فنادقها: طابا هايتس، موفنبيك طابا. قريبة من جزيرة فرعون."
    - text: "🏖️ Taba in Sinai, on the border with Israel and Jordan, with luxury resorts and stunning views. Famous hotels: Taba Heights, Mövenpick Taba. Close to Pharaoh's Island."

  utter_ask_nuweiba:
    - condition:
        - type: slot
          name: language
          value: "ar"
